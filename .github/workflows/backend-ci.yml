name: Backend CI/CD - WorkNest

# Workflow sẽ chạy khi nào?
on:
  push:
    branches: [ main, develop ]  # Khi push code lên nhánh main hoặc develop
    paths:
      - 'BEWorkNest/**'  # Chỉ chạy khi có thay đổi trong thư mục backend
  pull_request:
    branches: [ main, develop ]  # Khi tạo Pull Request vào main hoặc develop
    paths:
      - 'BEWorkNest/**'
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

# Định nghĩa các job cần chạy
jobs:
  # Job 1: Build và Test Backend
  build-and-test:
    name: Build và Test Backend .NET
    runs-on: ubuntu-latest  # Chạy trên Ubuntu (miễn phí)
    
    steps:
    # Bước 1: Lấy code về
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    # Bước 2: Cài đặt .NET SDK
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'  # Version .NET của bạn
        
    # Bước 3: Cache dependencies để build nhanh hơn
    - name: 💾 Cache NuGet packages
      uses: actions/cache@v3
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
    
    # Bước 4: Restore các package cần thiết
    - name: 📦 Restore dependencies
      working-directory: ./BEWorkNest
      run: dotnet restore BEWorkNest.sln
      
    # Bước 5: Build project
    - name: 🔨 Build
      working-directory: ./BEWorkNest
      run: dotnet build BEWorkNest.sln --no-restore --configuration Release
      
    # Bước 6: Chạy Unit Tests với Coverage ✅
    - name: 🧪 Run Unit Tests
      working-directory: ./BEWorkNest.Tests
      run: |
        dotnet test \
          --configuration Release \
          --logger "trx;LogFileName=test-results.trx" \
          --logger "console;verbosity=detailed" \
          --collect:"XPlat Code Coverage" \
          --results-directory ./TestResults
      
    # Bước 7: Generate Coverage Report
    - name: 📊 Generate Coverage Report
      if: always()
      run: |
        dotnet tool install -g dotnet-reportgenerator-globaltool || true
        reportgenerator \
          "-reports:BEWorkNest.Tests/TestResults/**/coverage.cobertura.xml" \
          "-targetdir:coverage-report" \
          "-reporttypes:Html;TextSummary;Badges;Cobertura" \
          "-classfilters:-System.*;-Microsoft.*;-*.Program;-*.Startup" \
          "-filefilters:-*.Designer.cs;-*Migrations/*.cs"
        echo "📊 Coverage Summary:"
        cat coverage-report/Summary.txt || echo "Chưa có coverage data"
      continue-on-error: true
      
    # Bước 8: Upload Coverage to Codecov
    - name: 📤 Upload Coverage to Codecov
      if: always()
      uses: codecov/codecov-action@v4
      with:
        files: ./coverage-report/Cobertura.xml
        flags: backend,unittests
        name: worknest-backend
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      continue-on-error: true
      
    # Bước 9: Upload test results as artifacts
    - name: 📦 Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          BEWorkNest.Tests/TestResults/**/*.trx
          coverage-report/
        retention-days: 30
      continue-on-error: true
      
    # Bước 10: Comment PR với kết quả coverage
    - name: 💬 Comment Coverage on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      continue-on-error: true
      with:
        script: |
          const fs = require('fs');
          let comment = '## 🎯 Backend CI/CD Results\n\n';
          
          // Read coverage summary if exists
          try {
            const summaryPath = 'coverage-report/Summary.txt';
            if (fs.existsSync(summaryPath)) {
              const summary = fs.readFileSync(summaryPath, 'utf8');
              comment += '### 📊 Code Coverage\n\n';
              comment += '```\n' + summary + '\n```\n\n';
            }
          } catch (e) {
            comment += '⚠️ Coverage report not available\n\n';
          }
          
          comment += '### ✅ Build Status\n\n';
          comment += '- ✅ Build: Success\n';
          comment += '- 🧪 Tests: Passed\n';
          comment += '- 📦 Artifacts: Uploaded\n\n';
          comment += '---\n';
          comment += '*Generated by GitHub Actions*\n';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  # Job 2: Code Quality Check
  code-quality:
    name: Kiểm tra chất lượng code
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Cần full history cho SonarCloud
        
    - name: 🔧 Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: 📦 Restore dependencies
      working-directory: ./BEWorkNest
      run: dotnet restore BEWorkNest.sln
      
    - name: 🔨 Build
      working-directory: ./BEWorkNest
      run: dotnet build BEWorkNest.sln --no-restore
      
    # Có thể thêm SonarCloud sau
    # - name: 🔍 SonarCloud Scan
    #   uses: SonarSource/sonarcloud-github-action@master
    #   env:
    #     GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    
  # Job 3: Security Scan
  security-scan:
    name: Kiểm tra bảo mật
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔒 Run Dependency Check
      uses: dependency-check/Dependency-Check_Action@main
      with:
        project: 'WorkNest-Backend'
        path: './BEWorkNest'
        format: 'HTML'
      continue-on-error: true
      
    - name: 📤 Upload Security Report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: security-report
        path: reports/
      continue-on-error: true
